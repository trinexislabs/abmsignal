# ABMSignal — production stack
#
#   caddy   : TLS termination + reverse proxy (auto HTTPS via Let's Encrypt)
#   web     : Next.js app server
#   worker  : BullMQ consumer that drives playbook generation
#   redis   : job queue broker
#   migrate : one-shot, runs `prisma migrate deploy` before web/worker start
#
# The database is a libsql/SQLite file on the `appdata` volume, shared by web,
# worker and migrate. For multi-node / high-write scale, switch DATABASE_URL to
# a managed libsql (Turso) URL and drop the appdata mounts — see DEPLOYMENT_GUIDE.md.

x-app-build: &app-build
  context: .
  target: runtime
  args:
    # NEXT_PUBLIC_* must be available at build time (inlined into the client bundle).
    NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
    NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: *app-build
    image: abmsignal:latest
    env_file: .env.production
    command: ["npx", "prisma", "migrate", "deploy"]
    volumes:
      - appdata:/data
    restart: "no"

  web:
    build: *app-build
    image: abmsignal:latest
    env_file: .env.production
    volumes:
      - appdata:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  worker:
    build: *app-build
    image: abmsignal:latest
    env_file: .env.production
    command: ["npx", "tsx", "src/server/jobs/worker-process.ts"]
    volumes:
      - appdata:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  appdata:
  redisdata:
  caddydata:
  caddyconfig:
